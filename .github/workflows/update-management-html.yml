name: Update management.html

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:       # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest release info
        id: release
        run: |
          RELEASE=$(curl -sf https://api.github.com/repos/router-for-me/Cli-Proxy-API-Management-Center/releases/latest)
          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          DOWNLOAD_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name == "management.html") | .browser_download_url')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Error: could not retrieve release tag from upstream repository." >&2
            exit 1
          fi
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "Error: management.html asset not found in release $TAG." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"

      - name: Check current version
        id: check
        run: |
          CURRENT_TAG=$(cat .management-html-version 2>/dev/null | tr -d '[:space:]' || echo "none")
          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT_TAG" != "${{ steps.release.outputs.tag }}" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download management.html
        if: steps.check.outputs.needs_update == 'true'
        run: |
          curl -fL "${{ steps.release.outputs.download_url }}" -o management.html

      - name: Update version tracker
        if: steps.check.outputs.needs_update == 'true'
        run: |
          echo "${{ steps.release.outputs.tag }}" > .management-html-version

      - name: Commit and push changes
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add management.html .management-html-version
          git commit -m "chore: update management.html to ${{ steps.release.outputs.tag }}"
          git push
